<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ICP Framework — VerkadaWin</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #f4f5f7;
      color: #1a1a1a;
      min-height: 100vh;
    }

    /* ── Topbar ── */
    .topbar {
      background: #0f0f0f;
      color: #fff;
      padding: 0 24px;
      height: 52px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      position: sticky;
      top: 0;
      z-index: 50;
    }
    .topbar-left { display: flex; align-items: center; gap: 16px; }
    .topbar-title { font-size: 14px; font-weight: 700; }
    .topbar-badge {
      font-size: 10px;
      font-weight: 600;
      background: #1a1a1a;
      border: 1px solid #333;
      color: #aaa;
      padding: 2px 8px;
      border-radius: 4px;
      letter-spacing: 0.06em;
      text-transform: uppercase;
    }
    .btn-print {
      background: #fff;
      color: #0f0f0f;
      border: none;
      border-radius: 6px;
      padding: 6px 14px;
      font-size: 12px;
      font-weight: 600;
      cursor: pointer;
    }
    .btn-print:hover { background: #e5e7eb; }

    /* ── ICP Nav ── */
    .icp-nav {
      background: #fff;
      border-bottom: 2px solid #e8e8e8;
      padding: 0 20px;
      display: flex;
      gap: 2px;
      overflow-x: auto;
      position: sticky;
      top: 52px;
      z-index: 40;
    }
    .icp-tab {
      padding: 14px 18px 12px;
      border: none;
      background: none;
      font-size: 12px;
      font-weight: 700;
      color: #999;
      cursor: pointer;
      border-bottom: 3px solid transparent;
      white-space: nowrap;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      transition: color 0.15s, border-color 0.15s;
      margin-bottom: -2px;
    }
    .icp-tab:hover { color: #333; }
    .icp-tab.active { color: var(--tc); border-bottom-color: var(--tc); }

    /* ── ICP Panel ── */
    .icp-panel { display: none; }
    .icp-panel.active { display: block; }

    /* ── ICP Header ── */
    .icp-header {
      padding: 26px 24px 22px;
      position: relative;
      overflow: hidden;
    }
    .icp-header::after {
      content: '';
      position: absolute;
      right: -40px;
      top: -40px;
      width: 260px;
      height: 260px;
      border-radius: 50%;
      background: rgba(255,255,255,0.06);
    }
    .icp-header-eyebrow {
      font-size: 10px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.12em;
      color: rgba(255,255,255,0.6);
      margin-bottom: 6px;
    }
    .icp-header-name {
      font-size: 30px;
      font-weight: 800;
      color: #fff;
      margin-bottom: 4px;
      line-height: 1.1;
    }
    .icp-header-sub {
      font-size: 15px;
      color: rgba(255,255,255,0.75);
      font-weight: 400;
    }
    .icp-header-meta {
      margin-top: 14px;
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }
    .icp-meta-chip {
      background: rgba(255,255,255,0.15);
      color: rgba(255,255,255,0.9);
      font-size: 11px;
      font-weight: 600;
      padding: 4px 10px;
      border-radius: 20px;
      border: 1px solid rgba(255,255,255,0.2);
    }

    /* ── Grid ── */
    .icp-grid {
      display: grid;
      grid-template-columns: 290px 1fr 230px;
      gap: 10px;
      padding: 14px 18px 36px;
      align-items: start;
      grid-template-areas:
        "desc     metrics    why"
        "outreach outreach   why"
        "char     discovery  why"
        "examples personas   personas"
        ".        plays      opp"
        "battle   battle     battle"
        "products products   products";
    }

    /* ── Cards ── */
    .card {
      border-radius: 10px;
      overflow: hidden;
      box-shadow: 0 1px 4px rgba(0,0,0,0.08), 0 0 0 1px rgba(0,0,0,0.04);
    }
    .ch {
      padding: 10px 14px;
      color: #fff;
      display: flex;
      align-items: center;
      gap: 7px;
    }
    .ch-icon { font-size: 14px; line-height: 1; }
    .ch-title { font-size: 12px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.07em; }
    .ch-sub { font-size: 10px; opacity: 0.75; margin-top: 1px; }
    .cb { background: #fff; padding: 14px 16px; }

    /* Card area assignments */
    .c-desc     { grid-area: desc; }
    .c-metrics  { grid-area: metrics; }
    .c-why      { grid-area: why; }
    .c-char     { grid-area: char; }
    .c-personas { grid-area: personas; }
    .c-examples { grid-area: examples; }
    .c-plays    { grid-area: plays; }
    .c-opp      { grid-area: opp; }
    .c-products { grid-area: products; }

    /* Card header colors */
    .hd-teal    { background: #0e7490; }
    .hd-teal2   { background: #0f766e; }
    .hd-slate   { background: #374151; }
    .hd-blue    { background: #1d4ed8; }
    .hd-indigo  { background: #4338ca; }
    .hd-purple  { background: #6d28d9; }
    .hd-dark    { background: #1e3a5f; }
    .hd-gray    { background: #4b5563; }

    /* ── List styles ── */
    .blist { list-style: none; display: flex; flex-direction: column; gap: 7px; }
    .blist li {
      font-size: 12.5px;
      color: #374151;
      line-height: 1.5;
      padding-left: 14px;
      position: relative;
    }
    .blist li::before {
      content: '+';
      position: absolute;
      left: 0;
      font-weight: 800;
      color: #9ca3af;
    }
    .blist li strong { color: #111; }

    /* ── Example pills ── */
    .ex-grid { display: flex; flex-wrap: wrap; gap: 6px; }
    .ex-pill {
      background: #f9fafb;
      border: 1px solid #e5e7eb;
      border-radius: 6px;
      padding: 5px 9px;
      font-size: 11px;
      font-weight: 600;
      color: #374151;
    }

    /* ── Personas ── */
    .personas-row {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 10px;
    }
    .persona-card {
      background: #faf5ff;
      border: 1px solid #e9d5ff;
      border-radius: 10px;
      padding: 16px 10px 14px;
      text-align: center;
    }
    .p-avatar {
      width: 50px;
      height: 50px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 13px;
      font-weight: 800;
      color: #fff;
      margin: 0 auto 10px;
    }
    .p-num {
      font-size: 9px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: #7c3aed;
      margin-bottom: 3px;
    }
    .p-title {
      font-size: 11.5px;
      font-weight: 700;
      color: #111;
      line-height: 1.3;
      margin-bottom: 3px;
    }
    .p-dept {
      font-size: 10px;
      color: #888;
      line-height: 1.3;
    }

    /* ── Customer Plays ── */
    .play-list { display: flex; flex-direction: column; gap: 8px; }
    .play-item {
      font-size: 12px;
      color: #374151;
      padding: 8px 10px 8px 12px;
      background: #f9fafb;
      border-radius: 6px;
      border-left: 3px solid #9ca3af;
      line-height: 1.4;
    }
    .play-name { font-weight: 700; color: #111; display: block; margin-bottom: 2px; }

    /* ── Opportunity ── */
    .opp-list { display: flex; flex-direction: column; gap: 7px; }
    .opp-item {
      font-size: 12px;
      color: #374151;
      line-height: 1.4;
      padding-left: 14px;
      position: relative;
    }
    .opp-item::before { content: '→'; position: absolute; left: 0; color: #60a5fa; font-weight: 700; }

    /* ── Products bar ── */
    .products-bar {
      background: #fff;
      border-radius: 10px;
      padding: 12px 16px;
      display: flex;
      align-items: center;
      gap: 10px;
      flex-wrap: wrap;
      box-shadow: 0 1px 4px rgba(0,0,0,0.08), 0 0 0 1px rgba(0,0,0,0.04);
    }
    .prod-label {
      font-size: 10px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: #9ca3af;
      margin-right: 4px;
    }
    .prod-chip {
      padding: 4px 12px;
      border-radius: 20px;
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.04em;
    }
    .prod-note {
      margin-left: auto;
      font-size: 10px;
      color: #9ca3af;
      font-style: italic;
    }

    /* ── Discovery ── */
    .hd-cyan { background: #0369a1; }
    .c-discovery { grid-area: discovery; }
    .q-list { display: flex; flex-direction: column; gap: 7px; }
    .q-item {
      font-size: 12.5px;
      color: #1e3a5f;
      line-height: 1.5;
      padding: 8px 12px;
      background: #eff6ff;
      border-radius: 6px;
      border-left: 3px solid #2563eb;
      font-style: italic;
    }
    .q-item strong { font-style: normal; color: #1d4ed8; }

    /* ── Outreach ── */
    .hd-emerald { background: #15803d; }
    .c-outreach { grid-area: outreach; }
    .email-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 14px; }
    .email-item {
      padding: 10px 12px;
      background: #f0fdf4;
      border-radius: 6px;
      border-left: 3px solid #16a34a;
    }
    .email-to {
      font-size: 9px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: #15803d;
      margin-bottom: 4px;
    }
    .email-subject {
      font-size: 12px;
      font-weight: 700;
      color: #111;
      margin-bottom: 6px;
    }
    .email-body {
      font-size: 12px;
      color: #4b5563;
      line-height: 1.55;
    }

    /* ── Compete ── */
    .hd-black { background: #111827; }
    .c-battle { grid-area: battle; }
    .compete-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 14px; }
    .compete-col-header {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 10px;
      padding-bottom: 8px;
      border-bottom: 2px solid #f3f4f6;
    }
    .compete-vs {
      font-size: 9px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.07em;
      color: #dc2626;
      background: #fee2e2;
      padding: 2px 7px;
      border-radius: 3px;
    }
    .compete-name { font-size: 13px; font-weight: 800; color: #111; }
    .compete-win {
      font-size: 11px;
      font-weight: 600;
      color: #059669;
      background: #d1fae5;
      padding: 1px 6px;
      border-radius: 3px;
      margin-left: auto;
      white-space: nowrap;
    }
    .compete-list { display: flex; flex-direction: column; gap: 6px; }
    .compete-item {
      font-size: 12px;
      color: #374151;
      line-height: 1.45;
      padding-left: 16px;
      position: relative;
    }
    .compete-item::before {
      content: '✓';
      position: absolute;
      left: 0;
      font-weight: 700;
      color: #059669;
      font-size: 11px;
    }
    .compete-item strong { color: #111; }

    /* ── Print ── */
    @media print {
      .topbar, .icp-nav { display: none !important; }
      .icp-panel { display: block !important; page-break-after: always; }
      body { background: #fff; }
      .icp-grid { padding: 12px; }
    }
  </style>
</head>

function esc(s) {
  return (s || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function renderNav() {
  const nav = document.getElementById('icp-nav');
  nav.innerHTML = ICPs.map((icp, i) =>
    `<button class="icp-tab${i===0?' active':''}" style="--tc:${icp.color}" onclick="showICP(${i})">${icp.name}</button>`
  ).join('');
}

function showICP(idx) {
  document.querySelectorAll('.icp-tab').forEach((t,i) => t.classList.toggle('active', i===idx));
  document.querySelectorAll('.icp-panel').forEach((p,i) => p.classList.toggle('active', i===idx));
}

renderNav();
renderPanels();
</script>
</body>
